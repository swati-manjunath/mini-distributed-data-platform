services:
  jobmanager:
    image: my-pyflink:latest
    ports:
      - "8085:8081"
    command: jobmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=jobmanager
    volumes:
      - ./jobs:/jobs

  taskmanager:
    image: my-pyflink:latest
    depends_on:
      - jobmanager
    command: taskmanager
    scale: 1
    environment:
      - JOB_MANAGER_RPC_ADDRESS=jobmanager

networks:
  default:
    external:
      name: streaming-network